name: CYCC Manual Crawl

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CYCC metadata crawler
        run: |
          python scripts/crawl_cycc_public_records.py

      - name: Validate crawl report
        run: |
          python -m json.tool data/processed/cycc_public_records_crawl_report.json > /tmp/cycc_public_records_crawl_report.pretty.json
          test -f data/raw/cycc_minutes_metadata.csv
          test -f data/raw/cycc_question_video_metadata.csv

      - name: Upload internal crawl artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cycc-public-records-metadata
          path: |
            data/raw/cycc_minutes_metadata.csv
            data/raw/cycc_question_video_metadata.csv
            data/processed/cycc_public_records_crawl_report.json
          if-no-files-found: error
          retention-days: 14
