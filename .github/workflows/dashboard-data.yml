name: Dashboard Data

on:
  pull_request:
    paths:
      - "src/processors/**"
      - "scripts/build_hotspots_geojson.py"
      - "scripts/build_geocoding_review_queue.py"
      - "scripts/build_transcript_review_queue.py"
      - "scripts/build_cycc_minutes_review_queue.py"
      - "data/raw/cycc_question_video_metadata.csv"
      - "dashboard/data/**"
      - "tests/test_build_dashboard_data.py"
      - "tests/test_build_hotspots_geojson.py"
      - "tests/test_build_geocoding_review_queue.py"
      - "tests/test_build_transcript_review_queue.py"
      - "tests/test_build_cycc_minutes_review_queue.py"
      - "tests/test_dashboard_json_validation.py"
      - "tests/test_local_terminology.py"
      - "tests/test_local_place_dictionary.py"
      - ".github/workflows/dashboard-data.yml"
  push:
    branches:
      - main
    paths:
      - "src/processors/**"
      - "scripts/build_hotspots_geojson.py"
      - "scripts/build_geocoding_review_queue.py"
      - "scripts/build_transcript_review_queue.py"
      - "scripts/build_cycc_minutes_review_queue.py"
      - "data/raw/cycc_question_video_metadata.csv"
      - "dashboard/data/**"
      - "tests/test_build_dashboard_data.py"
      - "tests/test_build_hotspots_geojson.py"
      - "tests/test_build_geocoding_review_queue.py"
      - "tests/test_build_transcript_review_queue.py"
      - "tests/test_build_cycc_minutes_review_queue.py"
      - "tests/test_dashboard_json_validation.py"
      - "tests/test_local_terminology.py"
      - "tests/test_local_place_dictionary.py"
      - ".github/workflows/dashboard-data.yml"
  workflow_dispatch:

jobs:
  build-dashboard-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build dashboard data
        run: |
          python src/processors/build_dashboard_data.py

      - name: Build hotspots GeoJSON
        run: |
          python scripts/build_hotspots_geojson.py

      - name: Build geocoding review queue
        run: |
          python scripts/build_geocoding_review_queue.py

      - name: Build transcript review queue
        run: |
          python scripts/build_transcript_review_queue.py

      - name: Build CYCC minutes review queue
        run: |
          python scripts/build_cycc_minutes_review_queue.py

      - name: Validate dashboard JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "dashboard_summary.json",
              "issue_ranking.json",
              "hotspots.json",
              "hotspots.geojson",
              "geocoding_review_queue.json",
              "transcript_review_queue.json",
              "cycc_minutes_review_queue.json",
          ]
          data_dir = Path("dashboard/data")
          for filename in required:
              path = data_dir / filename
              if not path.exists():
                  raise SystemExit(f"Missing {path}")
              json.loads(path.read_text(encoding="utf-8"))
          print("Dashboard JSON, GeoJSON, geocoding, transcript, and CYCC minutes review queue files are valid.")
          PY

      - name: Run dashboard data tests
        run: |
          pytest -q tests/test_build_dashboard_data.py
          pytest -q tests/test_build_hotspots_geojson.py
          pytest -q tests/test_build_geocoding_review_queue.py
          pytest -q tests/test_build_transcript_review_queue.py
          pytest -q tests/test_build_cycc_minutes_review_queue.py
          pytest -q tests/test_dashboard_json_validation.py
          pytest -q tests/test_local_terminology.py
          pytest -q tests/test_local_place_dictionary.py
