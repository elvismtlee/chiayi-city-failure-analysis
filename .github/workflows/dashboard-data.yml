  workflow_dispatch:

jobs:
  build-dashboard-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build dashboard data
        run: python src/processors/build_dashboard_data.py
      - name: Build hotspots GeoJSON
        run: python scripts/build_hotspots_geojson.py
      - name: Build geocoding review queue
        run: python scripts/build_geocoding_review_queue.py
      - name: Build transcript review queue
        run: python scripts/build_transcript_review_queue.py
      - name: Build CYCC minutes review queue
        run: python scripts/build_cycc_minutes_review_queue.py
      - name: Build CYCC minutes reviewed sample
        run: python scripts/build_cycc_minutes_reviewed_sample.py
      - name: Build CYCC minutes issue candidates
        run: python scripts/build_cycc_minutes_issue_candidates.py
      - name: Build weekly summary draft
        run: python scripts/build_weekly_summary_draft.py
      - name: Build policy draft candidates
        run: python scripts/build_policy_draft_candidates.py
      - name: Build social post drafts
        run: python scripts/build_social_post_drafts.py
      - name: Build short video script drafts
        run: python scripts/build_short_video_script_drafts.py
      - name: Build filming checklists
        run: python scripts/build_filming_checklists.py
      - name: Build content schedule
        run: python scripts/build_content_schedule.py
      - name: Build daily execution list
        run: python scripts/build_daily_execution_list.py
      - name: Build public material review queue
        run: python scripts/build_public_material_review_queue.py
      - name: Build approved materials sample
        run: python scripts/build_approved_materials_sample.py
      - name: Build CYCC metadata dashboard data
        run: python scripts/build_cycc_metadata_dashboard_data.py
      - name: Build command center overview
        run: python scripts/build_command_center_overview.py
      - name: Build dashboard health check
        run: python scripts/build_dashboard_health_check.py
      - name: Build weekly system report
        run: python scripts/build_weekly_system_report.py
      - name: Validate dashboard JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          required = [
              "dashboard_summary.json",
              "issue_ranking.json",
              "hotspots.json",
              "hotspots.geojson",
              "geocoding_review_queue.json",
              "transcript_review_queue.json",
              "cycc_minutes_review_queue.json",
              "cycc_minutes_issue_candidates.json",
              "weekly_summary_draft.json",
              "policy_draft_candidates.json",
              "social_post_drafts.json",
              "short_video_script_drafts.json",
              "filming_checklists.json",
              "content_schedule.json",
              "daily_execution_list.json",
              "public_material_review_queue.json",
              "approved_materials_sample.json",
              "cycc_minutes_metadata.json",
              "cycc_question_video_metadata.json",
              "command_center_overview.json",
              "dashboard_health_check.json",
              "weekly_system_report.json",
          ]
          data_dir = Path("dashboard/data")
          for filename in required:
              path = data_dir / filename
              if not path.exists():
                  raise SystemExit(f"Missing {path}")
              json.loads(path.read_text(encoding="utf-8"))
          print("Dashboard JSON content draft files are valid.")
          PY
      - name: Run dashboard data tests
        run: |
          pytest -q tests/test_build_dashboard_data.py
          pytest -q tests/test_build_hotspots_geojson.py
          pytest -q tests/test_build_geocoding_review_queue.py
          pytest -q tests/test_build_transcript_review_queue.py
          pytest -q tests/test_build_cycc_minutes_review_queue.py
          pytest -q tests/test_build_cycc_minutes_reviewed_sample.py
          pytest -q tests/test_build_cycc_minutes_issue_candidates.py
          pytest -q tests/test_minutes_issues_page.py
          pytest -q tests/test_build_social_post_drafts.py
          pytest -q tests/test_build_short_video_script_drafts.py
          pytest -q tests/test_build_filming_checklists.py
          pytest -q tests/test_build_content_schedule.py
          pytest -q tests/test_build_daily_execution_list.py
          pytest -q tests/test_build_public_material_review_queue.py
          pytest -q tests/test_build_approved_materials_sample.py
          pytest -q tests/test_build_cycc_metadata_dashboard_data.py
          pytest -q tests/test_social_drafts_page.py
          pytest -q tests/test_video_scripts_page.py
          pytest -q tests/test_filming_checklists_page.py
          pytest -q tests/test_content_schedule_page.py
          pytest -q tests/test_daily_execution_page.py
          pytest -q tests/test_public_review_page.py
          pytest -q tests/test_approved_materials_page.py
          pytest -q tests/test_cycc_metadata_page.py
          pytest -q tests/test_weekly_summary_page.py
          pytest -q tests/test_policy_drafts_page.py
          pytest -q tests/test_build_command_center_overview.py
          pytest -q tests/test_build_dashboard_health_check.py
          pytest -q tests/test_build_weekly_system_report.py
          pytest -q tests/test_command_center_page.py
          pytest -q tests/test_health_check_page.py
          pytest -q tests/test_weekly_system_report_page.py
          pytest -q tests/test_dashboard_json_validation.py
          pytest -q tests/test_local_terminology.py
