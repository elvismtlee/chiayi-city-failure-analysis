name: Dashboard Data

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-dashboard-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build dashboard data
        run: |
          python src/processors/build_dashboard_data.py

      - name: Validate dashboard JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "dashboard_summary.json",
              "issue_ranking.json",
              "hotspots.json",
              "ai_issue_summary.json",
          ]
          data_dir = Path("dashboard/data")
          for filename in required:
              path = data_dir / filename
              if not path.exists():
                  raise SystemExit(f"Missing {path}")
              json.loads(path.read_text(encoding="utf-8"))
          print("Dashboard JSON files are valid.")
          PY

      - name: Run dashboard pytest
        run: |
          pytest -q tests/test_build_dashboard_data.py
