<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市熱點地圖｜嘉義城市故障分析中心</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root{--green:#0f766e;--dark:#064e3b;--text:#172033;--muted:#64748b;--card:#fff}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:var(--text);background:linear-gradient(180deg,#f3fbf7,#f8fafc)}.hero{padding:36px 24px 42px;color:#fff;background:linear-gradient(135deg,#064e3b,#0f766e)}.inner,.wrap{max-width:1180px;margin:auto}.nav{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px}.nav a{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:8px 14px;background:rgba(255,255,255,.12)}.nav a.active{background:#fff;color:var(--dark);font-weight:800}h1{font-size:clamp(34px,5vw,58px);margin:0 0 12px}.hero p{font-size:20px;line-height:1.7;max-width:820px;color:rgba(255,255,255,.9)}.wrap{padding:30px 24px 64px}.card{background:var(--card);border:1px solid rgba(15,118,110,.13);border-radius:24px;padding:18px;box-shadow:0 18px 50px rgba(15,23,42,.08)}#leafletHotspotMap{height:620px;border-radius:18px;overflow:hidden}.cyfa-marker{border-radius:999px;background:#0f766e;color:#fff;display:grid;place-items:center;border:3px solid #fff;box-shadow:0 8px 24px rgba(15,23,42,.28);font-weight:900}.cyfa-marker-high{background:#dc2626}.cyfa-marker-medium{background:#f97316}.cyfa-marker-low{background:#0f766e}.map-popup h3{margin:0 0 8px;color:#064e3b}.map-popup p{margin:6px 0}.map-note{color:#64748b;font-size:13px}.footer-note{margin-top:18px;color:var(--muted);line-height:1.7;font-size:14px}@media(max-width:900px){#leafletHotspotMap{height:460px}}
  </style>
</head>
<body>
  <section class="hero"><div class="inner"><nav class="nav"><a href="./index.html">城市儀表板首頁</a><a href="./insights.html">城市洞察分析</a><a href="./sources.html">資料來源</a><a href="./methodology.html">方法論</a><a href="./reports.html">城市週報</a></nav><h1>城市熱點地圖</h1><p>第一版 Leaflet / OpenStreetMap 熱點地圖，讀取 dashboard/data/hotspots.json。若資料尚未提供 lat/lng，會以 prototype 座標呈現並標示待更新。</p></div></section>
  <main class="wrap">
    <section class="card"><div id="leafletHotspotMap" data-render="leaflet_hotspot_map"></div></section>
    <p class="footer-note">本頁為地圖原型。正式版需接入 geocoding、GeoJSON、行政區圖層與更精準的地點資料。</p>
  </main>
  <script src="./shared-nav.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./leaflet-map.js"></script>
</body>
</html>
