<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>政策草稿候選清單</title>
  <style>
    :root{--green:#0f766e;--dark:#064e3b;--mint:#dff8ef;--bg:#f7fbf9;--text:#172033;--muted:#64748b;--line:#dbe5df;--card:#fff;--purple:#7c3aed;--orange:#f97316}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:var(--text);background:var(--bg)}.hero{padding:34px 24px 48px;color:#fff;background:radial-gradient(circle at 10% 20%,rgba(196,181,253,.25),transparent 24%),linear-gradient(135deg,#064e3b,#0f766e)}.inner,.wrap{max-width:1180px;margin:auto}.eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.32);border-radius:999px;padding:8px 14px;background:rgba(255,255,255,.12);letter-spacing:.12em;font-size:13px;text-transform:uppercase}.breadcrumb{margin:18px 0 10px;color:rgba(255,255,255,.76);font-weight:700}h1{font-size:clamp(34px,5vw,58px);line-height:1.08;margin:0 0 14px}.hero p{font-size:20px;line-height:1.8;max-width:920px;color:rgba(255,255,255,.92)}.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}.hero-actions a{color:#064e3b;background:#fff;text-decoration:none;border-radius:999px;padding:12px 18px;font-weight:900}.hero-actions a.secondary{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.35)}.wrap{padding:30px 24px 70px}.notice,.card{background:var(--card);border:1px solid rgba(15,118,110,.13);border-radius:22px;padding:22px;box-shadow:0 18px 50px rgba(15,23,42,.07)}.notice{border-left:6px solid var(--purple);line-height:1.8;margin-bottom:18px}.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:18px 0}.kpi .label{color:var(--muted);font-size:14px}.kpi .value{font-size:30px;font-weight:950;color:var(--dark);margin-top:8px}.section-head{display:flex;justify-content:space-between;gap:16px;align-items:end;margin:30px 0 14px}.section-head h2{margin:0;font-size:26px}.section-head p{margin:6px 0 0;color:var(--muted);line-height:1.6}.draft-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.draft-card{display:grid;gap:14px}.draft-card h3{margin:0;font-size:22px}.badge-row{display:flex;flex-wrap:wrap;gap:8px}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:900;background:#ecfdf5;color:#065f46;border:1px solid #bbf7d0}.badge.purple{background:#f5f3ff;color:#5b21b6;border-color:#ddd6fe}.badge.orange{background:#fff7ed;color:#9a3412;border-color:#fed7aa}.summary-text{line-height:1.8;color:#334155}.meta-list{display:grid;gap:8px;color:#475569;font-size:15px}.meta-list div{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:10px}.option-list{margin:0;padding-left:22px;line-height:1.8;color:#334155}.chip-list{display:flex;flex-wrap:wrap;gap:8px}.chip{border-radius:999px;border:1px solid var(--line);background:#fff;padding:7px 10px;color:#475569;font-size:14px}.empty{padding:24px;border:1px dashed rgba(15,118,110,.28);border-radius:20px;background:#fff;color:var(--muted)}a{color:#0f766e}@media(max-width:960px){.kpi-grid,.draft-grid{grid-template-columns:1fr 1fr}}@media(max-width:680px){.hero{padding:26px 16px 40px}.wrap{padding:22px 16px 56px}.kpi-grid,.draft-grid{grid-template-columns:1fr}.hero p{font-size:17px}.section-head{display:block}}
  </style>
</head>
<body>
  <section class="hero">
    <div class="inner">
      <nav class="nav"></nav>
      <div class="eyebrow">Policy Draft Candidates</div>
      <div class="breadcrumb" data-render="breadcrumb"></div>
      <h1>政策草稿候選清單</h1>
      <p>本頁是內部政策草稿候選，不是正式政見。所有內容對外使用前，必須經人工審核來源、上下文、法遵與政策表述。</p>
      <div class="hero-actions"><a href="./social-drafts.html">轉成社群草稿</a><a class="secondary" href="./weekly-summary.html">回到每週摘要</a></div>
    </div>
  </section>
  <main class="wrap">
    <section class="notice">政策草稿只是把公開資料與議題候選轉成可討論方向；在沒有人工查證前，不應對外宣稱為正式政見或承諾。</section>
    <section class="kpi-grid">
      <article class="card kpi"><div class="label">候選草稿數</div><div class="value" data-stat="total">–</div></article>
      <article class="card kpi"><div class="label">待人工審核</div><div class="value" data-stat="needs-review">–</div></article>
      <article class="card kpi"><div class="label">涉及局處</div><div class="value" data-stat="departments">–</div></article>
      <article class="card kpi"><div class="label">可延伸素材</div><div class="value" data-stat="next-step">–</div></article>
    </section>
    <section class="section-head"><div><h2>政策草稿卡片</h2><p>每張卡片包含問題陳述、可能真因、政策選項、第一步與審核狀態。</p></div></section>
    <section class="draft-grid" data-render="policy-drafts"></section>
  </main>
  <script src="./shared-nav.js?v=20260523-navux"></script>
  <script src="./policy-drafts.js"></script>
</body>
</html>
