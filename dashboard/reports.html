<body data-page="reports">
  <section class="hero"><div class="inner"><nav class="nav"><a href="./index.html">城市儀表板首頁</a><a href="./insights.html">城市洞察分析</a><a href="./sources.html">資料來源</a><a href="./methodology.html">方法論</a><a class="active" href="./reports.html">城市週報</a></nav><h1>嘉義城市故障週報</h1><p>保存每週產出的城市故障觀察，將資料整理成可閱讀、可追蹤、可行動的城市治理報告。</p></div></section>
