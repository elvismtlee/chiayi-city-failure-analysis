<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社群文案草稿清單</title>
  <style>:root{--green:#0f766e;--dark:#064e3b;--mint:#dff8ef;--text:#172033;--muted:#64748b;--line:#dbe5df;--card:#fff}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:var(--text);background:#f7fbf9}.hero{padding:36px 24px 46px;color:#fff;background:linear-gradient(135deg,#064e3b,#0f766e)}.inner,.wrap{max-width:1180px;margin:auto}.nav{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:26px}.nav a{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:8px 14px;background:rgba(255,255,255,.12)}.nav a.active{background:#fff;color:var(--dark);font-weight:800}h1{font-size:clamp(34px,5vw,56px);margin:0 0 12px}.hero p{font-size:20px;line-height:1.7;max-width:900px;color:rgba(255,255,255,.9)}.wrap{padding:30px 24px 64px}.grid3,.draft-grid{display:grid;gap:16px}.grid3{grid-template-columns:repeat(3,1fr)}.draft-grid{grid-template-columns:repeat(2,1fr)}.card{background:var(--card);border:1px solid rgba(15,118,110,.13);border-radius:18px;padding:22px;box-shadow:0 18px 50px rgba(15,23,42,.08)}.card h3{margin:0 0 10px}.draft-card{display:grid;gap:12px}.draft-card h3{display:flex;justify-content:space-between;gap:12px}.stat-number{font-size:32px;font-weight:950;color:var(--dark)}.disclosure{border-left:5px solid var(--green);background:#f8fffb}.excerpt{padding:12px;border-radius:14px;background:#f8fafc;border:1px solid var(--line);line-height:1.7}.meta{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.meta div{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fbfefd}.muted{color:var(--muted);font-size:14px}.empty{padding:24px;border:1px dashed rgba(15,118,110,.28);border-radius:20px;background:#fff;color:var(--muted)}ul{margin:0;padding-left:20px;line-height:1.7}@media(max-width:900px){.grid3,.draft-grid,.meta{grid-template-columns:1fr}.wrap{padding:24px 16px 52px}}</style>
</head>
<body>
  <section class="hero"><div class="inner"><nav class="nav"></nav><h1>社群文案草稿清單</h1><p>本頁是內部文案草稿，不是自動發布內容。對外使用前需人工審核來源、語氣、法遵與平台適用性。</p></div></section>
  <main class="wrap"><section class="card disclosure"><p>所有社群草稿都是 internal draft / needs human review，不會連接 Facebook、Threads、LINE 或其他平台 API，也不會自動發布或寄出訊息。</p></section><section class="grid3"><article class="card"><h3>總草稿數</h3><div class="stat-number" data-stat="total">–</div></article><article class="card"><h3>需要人工審核</h3><div class="stat-number" data-stat="needs-review">–</div></article><article class="card"><h3>各 channel 筆數</h3><div class="stat-number" data-stat="channels">–</div></article></section><section class="draft-grid" data-render="social-drafts"></section></main>
  <script src="./shared-nav.js"></script>
  <script src="./social-drafts.js"></script>
</body>
</html>
