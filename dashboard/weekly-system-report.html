<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>每週系統報告</title>
  <style>
    body { margin: 0; font-family: "Microsoft JhengHei", Arial, sans-serif; background: #f7f8fa; color: #1f2933; }
    header { background: #17324d; color: white; padding: 24px; }
    nav { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; }
    nav a { color: white; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,.45); }
    main { max-width: 1120px; margin: 0 auto; padding: 24px; }
    section { background: white; border: 1px solid #d9e2ec; border-radius: 8px; padding: 18px; margin: 16px 0; }
    .notice { background: #fff7ed; border-color: #fed7aa; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .metric { border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; background: #fbfcfd; }
  </style>
</head>
<body>
  <header>
    <h1>每週系統報告</h1>
    <p>internal dashboard / needs human review / manual publishing only</p>
    <nav class="nav"></nav>
  </header>
  <main>
    <section class="notice">這是內部系統報告，不是對外宣傳內容，不代表資料已完成人工審核，不自動發布。</section>
    <section><h2>週期起訖</h2><p id="week-range"></p><p id="system-status"></p></section>
    <section><h2>Pipeline Summary</h2><div id="pipeline-summary" class="grid"></div></section>
    <section><h2>Review Backlog Summary</h2><div id="review-backlog-summary" class="grid"></div></section>
    <section><h2>Completed Outputs</h2><div id="completed-outputs" class="grid"></div></section>
    <section><h2>Warnings</h2><ul id="warnings"></ul></section>
    <section><h2>Recommended Next Actions</h2><ul id="recommended-next-actions"></ul></section>
  </main>
  <script src="./shared-nav.js"></script>
  <script src="./weekly-system-report.js"></script>
</body>
</html>
